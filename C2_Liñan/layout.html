<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Quiz</title>
</head>
<body>
    <h1>Geography Quiz</h1>

    <a href="#question1">Question 1</a> | 
    <a href="#question2">Question 2</a>

    <h2 id="question1">Question 1: What is the capital of France?</h2>
    <p>Choose the correct answer:</p>
    <form>
        <input type="radio" id="london" name="capital" value="London">
        <label for="london">London</label><br>

        <input type="radio" id="paris" name="capital" value="Paris">
        <label for="paris">Paris</label><br>

        <input type="radio" id="berlin" name="capital" value="Berlin">
        <label for="berlin">Berlin</label><br>
    </form>

    <h2 id="question2">Question 2: Which continent is Egypt in?</h2>
    <p>Select the right continent:</p>
    <form>
        <input type="radio" id="europe" name="continent" value="Europe">
        <label for="europe">Europe</label><br>

        <input type="radio" id="asia" name="continent" value="Asia">
        <label for="asia">Asia</label><br>

        <input type="radio" id="africa" name="continent" value="Africa">
        <label for="africa">Africa</label><br>
    </form>

    <footer>
        <p>Quiz created by Diego Alejandro Liñán Ríos</p>
    </footer>
</body>
</html>
